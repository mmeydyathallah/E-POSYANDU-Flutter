<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>E-POSYANDU - Register New Toddler</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#11d469",
                        "background-light": "#EAF9E7",
                        "background-dark": "#0a1a10",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .dark .glass-card {
            background: rgba(16, 34, 24, 0.6);
            border: 1px solid rgba(17, 212, 105, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header Section -->
<header class="sticky top-0 z-50 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-primary/10">
<div class="max-w-md mx-auto px-4 py-4 flex items-center justify-between">
<div class="flex items-center gap-3">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-primary/10 transition-colors text-slate-800 dark:text-slate-200">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-xl font-bold tracking-tight">Register New Toddler</h1>
</div>
<div class="size-10 rounded-full bg-primary/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">child_care</span>
</div>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 max-w-md mx-auto w-full px-4 pt-6 pb-32">
<div class="mb-6">
<h2 class="text-sm font-semibold uppercase tracking-wider text-primary/80 mb-2">Child Information</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm">Please fill in the details accurately to ensure proper health monitoring.</p>
</div>
<form class="space-y-6">
<!-- Glassmorphic Form Container -->
<div class="glass-card p-6 rounded-xl space-y-5 shadow-xl shadow-primary/5">
<!-- Full Name -->
<div class="relative group">
<label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase mb-1 ml-1">Child's Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">person</span>
<input class="w-full pl-10 pr-4 py-3 bg-white/50 dark:bg-background-dark/30 border border-primary/20 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="e.g. Liam Alexander" type="text"/>
</div>
</div>
<!-- Parents Section -->
<div class="grid grid-cols-1 gap-5">
<div class="relative group">
<label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase mb-1 ml-1">Father's Name</label>
<input class="w-full px-4 py-3 bg-white/50 dark:bg-background-dark/30 border border-primary/20 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="Name of father" type="text"/>
</div>
<div class="relative group">
<label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase mb-1 ml-1">Mother's Name</label>
<input class="w-full px-4 py-3 bg-white/50 dark:bg-background-dark/30 border border-primary/20 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="Name of mother" type="text"/>
</div>
</div>
<!-- Date of Birth -->
<div class="relative group">
<label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase mb-1 ml-1">Date of Birth</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">calendar_today</span>
<input class="w-full pl-10 pr-4 py-3 bg-white/50 dark:bg-background-dark/30 border border-primary/20 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all" type="date"/>
</div>
</div>
<!-- Gender Selection -->
<div>
<label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase mb-2 ml-1">Gender</label>
<div class="flex gap-3">
<label class="flex-1 cursor-pointer group">
<input class="peer hidden" name="gender" type="radio" value="male"/>
<div class="flex flex-col items-center justify-center p-3 rounded-xl border border-primary/20 bg-white/50 dark:bg-background-dark/30 peer-checked:bg-primary/20 peer-checked:border-primary peer-checked:text-primary transition-all">
<span class="material-symbols-outlined mb-1">male</span>
<span class="text-sm font-semibold">Male</span>
</div>
</label>
<label class="flex-1 cursor-pointer group">
<input class="peer hidden" name="gender" type="radio" value="female"/>
<div class="flex flex-col items-center justify-center p-3 rounded-xl border border-primary/20 bg-white/50 dark:bg-background-dark/30 peer-checked:bg-primary/20 peer-checked:border-primary peer-checked:text-primary transition-all">
<span class="material-symbols-outlined mb-1">female</span>
<span class="text-sm font-semibold">Female</span>
</div>
</label>
</div>
</div>
<!-- Head Circumference -->
<div class="relative group">
<label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase mb-1 ml-1">Initial Head Circumference (cm)</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">straighten</span>
<input class="w-full pl-10 pr-4 py-3 bg-white/50 dark:bg-background-dark/30 border border-primary/20 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="e.g. 35.5" step="0.1" type="number"/>
</div>
</div>
</div>
<!-- Save Button -->
<button class="w-full bg-primary text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/30 hover:shadow-primary/40 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span class="material-symbols-outlined">how_to_reg</span>
                Save Registration
            </button>
</form>
</main>
<!-- Floating Navigation Bar -->
<div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm glass-card rounded-full p-2 flex items-center justify-around shadow-2xl border border-primary/20 z-50">
<a class="flex items-center justify-center size-12 rounded-full text-slate-400 hover:bg-primary/10 transition-colors" href="#">
<span class="material-symbols-outlined">home</span>
</a>
<a class="flex items-center justify-center size-12 rounded-full bg-primary text-white shadow-lg shadow-primary/30" href="#">
<span class="material-symbols-outlined">person_add</span>
</a>
<a class="flex items-center justify-center size-12 rounded-full text-slate-400 hover:bg-primary/10 transition-colors" href="#">
<span class="material-symbols-outlined">monitoring</span>
</a>
<a class="flex items-center justify-center size-12 rounded-full text-slate-400 hover:bg-primary/10 transition-colors" href="#">
<span class="material-symbols-outlined">account_circle</span>
</a>
</div>
<!-- Modern Floating Glassmorphic Dock -->
<nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[92%] max-w-md z-50">
<div class="flex items-center justify-around px-4 py-3 rounded-full shadow-2xl backdrop-blur-xl border border-white/10" style="background: rgba(1, 50, 55, 0.85);">
<!-- Home -->
<a class="flex flex-col items-center gap-1 group" href="#">
<span class="material-symbols-outlined text-slate-400 group-hover:text-white transition-colors">home</span>
<span class="text-[10px] font-medium text-slate-400 group-hover:text-white">Home</span>
</a>
<!-- Data (Active) -->
<a class="flex flex-col items-center gap-1" href="#">
<span class="material-symbols-outlined text-[#11d469]">grid_view</span>
<span class="text-[10px] font-bold text-[#11d469]">Data</span>
</a>
<!-- Input (Central Floating Button) -->
<div class="relative -top-8">
<button class="size-14 rounded-full bg-[#11d469] text-[#013237] shadow-lg shadow-[#11d469]/30 flex items-center justify-center active:scale-95 transition-transform">
<span class="material-symbols-outlined text-3xl font-bold">add</span>
</button>
<span class="absolute -bottom-6 left-1/2 -translate-x-1/2 text-[10px] font-medium text-white">Input</span>
</div>
<!-- Growth -->
<a class="flex flex-col items-center gap-1 group" href="#">
<span class="material-symbols-outlined text-slate-400 group-hover:text-white transition-colors">monitoring</span>
<span class="text-[10px] font-medium text-slate-400 group-hover:text-white">Growth</span>
</a>
<!-- Export -->
<a class="flex flex-col items-center gap-1 group" href="#">
<span class="material-symbols-outlined text-slate-400 group-hover:text-white transition-colors">share</span>
<span class="text-[10px] font-medium text-slate-400 group-hover:text-white">Export</span>
</a>
</div>
</nav></body></html>
